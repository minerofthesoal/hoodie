name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc_version: "1.21.1"
            java_version: "21"
            props: "versions/1.21.1.properties"
          - mc_version: "1.21.8"
            java_version: "21"
            props: "versions/1.21.8.properties"
          - mc_version: "1.21.11"
            java_version: "21"
            props: "versions/1.21.11.properties"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply version-specific properties (${{ matrix.mc_version }})
        run: |
          # Preserve mod metadata, append version-specific Fabric properties
          {
            grep -E '^(mod_version|maven_group|archives_base_name)=' gradle.properties || true
            echo
            cat ${{ matrix.props }}
          } > gradle.properties.new
          mv gradle.properties.new gradle.properties
          echo "--- gradle.properties for MC ${{ matrix.mc_version }} ---"
          cat gradle.properties

      - name: Build main mod (MC ${{ matrix.mc_version }})
        run: ./gradlew build --no-daemon

      - name: Build client-only mod (MC ${{ matrix.mc_version }})
        run: ./gradlew :clientonly:build --no-daemon

      - name: Upload main mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: hoodie-mod-mc${{ matrix.mc_version }}
          path: build/libs/hoodie-mod-*.jar

      - name: Upload client-only mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: hoodie-clientonly-mc${{ matrix.mc_version }}
          path: clientonly/build/libs/hoodie-clientonly-*.jar
